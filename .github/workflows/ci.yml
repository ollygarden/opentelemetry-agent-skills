name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  skill-validation:
    runs-on: blacksmith

    steps:
      - name: Checkout Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@v7.0.0
        with:
          python-version: "3.14"

      - name: Install Agent Skills Reference Validator
        run: python -m pip install "git+https://github.com/agentskills/agentskills.git@38a2ff82958afee88dadf4831509e6f7e9d8ef4e#subdirectory=skills-ref"

      - name: Validate Skills
        run: |
          for skill in skills/*; do
            skills-ref validate "$skill"
          done

      - name: Check Skill Registration
        run: python .github/scripts/check-skill-registration.py

  tool-tests:
    runs-on: blacksmith

    steps:
      - name: Checkout Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: tools/otel-agent-tools/go.mod

      - name: Lint Tool
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: tools/otel-agent-tools
          args: ./...

      - name: Build Tool
        working-directory: tools/otel-agent-tools
        run: go build ./cmd/otel-agent-tools

      - name: Test Tool
        run: go test ./tools/otel-agent-tools/...

  check-links:
    runs-on: blacksmith

    steps:
      - name: Checkout Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install Lychee
        env:
          LYCHEE_VERSION: "0.24.2"
        run: |
          case "$RUNNER_ARCH" in
            X64) lychee_arch="x86_64" ;;
            ARM64) lychee_arch="aarch64" ;;
            *) echo "Unsupported runner architecture: $RUNNER_ARCH" >&2; exit 1 ;;
          esac

          archive="lychee-${lychee_arch}-unknown-linux-musl.tar.gz"
          release_url="https://github.com/lycheeverse/lychee/releases/download/lychee-v${LYCHEE_VERSION}"
          install_dir="$RUNNER_TEMP/lychee"
          mkdir -p "$install_dir"

          curl --fail --location --silent --show-error \
            --output "$RUNNER_TEMP/$archive" "$release_url/$archive"
          curl --fail --location --silent --show-error \
            --output "$RUNNER_TEMP/$archive.sha256" "$release_url/$archive.sha256"
          cd "$RUNNER_TEMP"
          sha256sum --check "$archive.sha256"
          tar --extract --gzip --file "$archive" --directory "$install_dir" \
            --strip-components=1
          echo "LYCHEE_BIN=$install_dir/lychee" >> "$GITHUB_ENV"

      - name: Check Links
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          "$LYCHEE_BIN" --verbose --no-progress
          skills/otel-sdk-versions/references/generated/otel-version-index.md
          --config .github/lychee.toml
