name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  skill-validation:
    runs-on: blacksmith

    steps:
      - name: Checkout Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Agent Skills Reference Validator
        run: python -m pip install "git+https://github.com/agentskills/agentskills.git@38a2ff82958afee88dadf4831509e6f7e9d8ef4e#subdirectory=skills-ref"

      - name: Validate Skills
        run: |
          for skill in skills/*; do
            skills-ref validate "$skill"
          done

      - name: Check Skill Registration
        run: python .github/scripts/check-skill-registration.py

  tool-tests:
    runs-on: blacksmith

    steps:
      - name: Checkout Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: tools/otel-agent-tools/go.mod

      - name: Lint Tool
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: tools/otel-agent-tools
          args: ./...

      - name: Build Tool
        working-directory: tools/otel-agent-tools
        run: go build ./cmd/otel-agent-tools

      - name: Test Tool
        run: go test ./tools/otel-agent-tools/...

  check-links:
    runs-on: blacksmith

    steps:
      - name: Checkout Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: "--verbose --no-progress skills/otel-sdk-versions/references/generated/otel-version-index.md --config .github/lychee.toml"
          failIfEmpty: false
        env:
          GITHUB_TOKEN: ${{ github.token }}
